<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bio Technology</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #0d1b2e;
        min-height: 100vh;
        overflow: hidden;
        font-family: Arial, sans-serif;
      }

      .loader-wrap {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
        opacity: 1;
        transition: opacity 0.5s ease;
      }
      .loader-wrap.out {
        opacity: 0;
      }

      .blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        pointer-events: none;
      }
      .blob-1 {
        width: 500px;
        height: 500px;
        background: #1db954;
        opacity: 0.15;
        top: -150px;
        left: -150px;
      }
      .blob-2 {
        width: 400px;
        height: 400px;
        background: #0a5c2e;
        opacity: 0.15;
        bottom: -100px;
        right: -100px;
      }
      .blob-3 {
        width: 300px;
        height: 300px;
        background: #1db954;
        opacity: 0.1;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }

      .loader-content {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        text-align: center;
        padding: 20px;
      }

      .loader-icon {
        font-size: 68px;
        color: #1db954;
        line-height: 1;
        animation: iconSpin 3s ease-in-out infinite;
      }
      @keyframes iconSpin {
        0%,
        100% {
          transform: rotate(0deg) scale(1);
        }
        50% {
          transform: rotate(180deg) scale(1.1);
        }
      }

      .loader-brand {
        font-size: 32px;
        font-weight: 800;
        color: #fff;
        letter-spacing: 0.5px;
      }

      .loader-sub {
        font-size: 12px;
        color: #5a7a9a;
        letter-spacing: 1.5px;
        text-transform: uppercase;
      }

      .dots {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #1db954;
        animation: bounce 1.2s ease-in-out infinite;
      }
      .dot:nth-child(1) {
        animation-delay: 0s;
      }
      .dot:nth-child(2) {
        animation-delay: 0.2s;
      }
      .dot:nth-child(3) {
        animation-delay: 0.4s;
      }
      .dot:nth-child(4) {
        animation-delay: 0.6s;
      }
      .dot:nth-child(5) {
        animation-delay: 0.8s;
      }
      @keyframes bounce {
        0%,
        80%,
        100% {
          transform: scale(0.6);
          opacity: 0.4;
        }
        40% {
          transform: scale(1.3);
          opacity: 1;
        }
      }

      .progress-track {
        width: 260px;
        height: 4px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        overflow: hidden;
      }

      /* Pure CSS animation — no JS transition needed */
      .progress-fill {
        height: 100%;
        width: 100%;
        background: linear-gradient(90deg, #1db954, #00e676);
        border-radius: 10px;
        transform-origin: left center;
        animation: fillBar 3s linear forwards;
      }
      @keyframes fillBar {
        from {
          transform: scaleX(0);
        }
        to {
          transform: scaleX(1);
        }
      }

      .loader-status {
        font-size: 12px;
        color: #5a7a9a;
        letter-spacing: 0.3px;
        min-height: 18px;
      }
    </style>
  </head>
  <body>
    <div class="loader-wrap" id="loaderWrap">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
      <div class="blob blob-3"></div>

      <div class="loader-content">
        <div class="loader-icon"><i class="bi bi-virus2"></i></div>
        <div class="loader-brand">Bio Technology</div>
        <div class="loader-sub">Laboratory &amp; Science Research</div>

        <div class="dots">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>

        <div class="progress-track">
          <div class="progress-fill"></div>
        </div>

        <div class="loader-status" id="loaderStatus">
          Initializing systems...
        </div>
      </div>
    </div>

    <script>
      const messages = [
        "Initializing systems...",
        "Loading lab data...",
        "Preparing dashboard...",
      ];
      let i = 0;
      const status = document.getElementById("loaderStatus");

      const msgInterval = setInterval(function () {
        i = (i + 1) % messages.length;
        status.textContent = messages[i];
      }, 1000);

      setTimeout(function () {
        clearInterval(msgInterval);
        document.getElementById("loaderWrap").classList.add("out");
        setTimeout(function () {
          sessionStorage.setItem("loaderDone", "1");
          var target = sessionStorage.getItem("loaderTarget") || "index.html";
          if (target === "index.html" || target === "") {
            sessionStorage.setItem("indexLoaderDone", "1");
          }
          window.location.href = target;
        }, 500);
      }, 3000);
    </script>
  </body>
</html>
